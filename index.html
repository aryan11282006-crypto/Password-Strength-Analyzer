<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Analyzer</title>

    <style>
        body{
            background:#eaf4ff;
            font-family:Arial,sans-serif;
        }

        .container{
            width:450px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px gray;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            font-size:16px;
            margin-top:10px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }

        #details{
            margin-top:15px;
            text-align:left;
            font-size:14px;
            line-height:1.6;
        }

        .box{
            background:#f5f7fa;
            padding:10px;
            border-radius:10px;
            margin-top:10px;
        }

        .show-box{
            margin-top:10px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Password Strength Analyzer</h2>

    <input type="password" id="password"
           placeholder="Enter Password">

    <!-- SHOW PASSWORD BUTTON -->
    <div class="show-box">
        <input type="checkbox" onclick="togglePassword()"> Show Password
    </div>

    <br>

    <button onclick="checkPassword()">Check Password</button>

    <div id="result"></div>
    <div id="details"></div>

</div>

<script>

// Show / Hide Password
function togglePassword(){
    let pass = document.getElementById("password");
    pass.type = (pass.type === "password") ? "text" : "password";
}

// RANDOM STRONG PASSWORD GENERATOR
function getRandomPassword(){
    let words = [
        "Aryan","Cyber","India","Secure","Alpha","Beta",
        "Tech","Safe","Code","AI","Pro","Lock"
    ];

    let symbols = ["@","#","$","%","&","*"];
    let num = Math.floor(Math.random()*9999);

    let w1 = words[Math.floor(Math.random()*words.length)];
    let w2 = words[Math.floor(Math.random()*words.length)];
    let sym = symbols[Math.floor(Math.random()*symbols.length)];

    return w1 + sym + w2 + num;
}

// MAIN FUNCTION
function checkPassword(){

    let password = document.getElementById("password").value;

    let score = 0;
    let reasons = [];
    let suggestions = [];

    if(password.length === 0){
        document.getElementById("result").innerHTML = "";
        document.getElementById("details").innerHTML = "";
        return;
    }

    if(password.length >= 8){
        score++;
    } else {
        reasons.push("❌ Password too short");
        suggestions.push("👉 Use at least 8–16 characters");
    }

    if(/[A-Z]/.test(password)){
        score++;
    } else {
        reasons.push("❌ Missing uppercase letter");
        suggestions.push("👉 Add A-Z letters");
    }

    if(/[a-z]/.test(password)){
        score++;
    } else {
        reasons.push("❌ Missing lowercase letter");
        suggestions.push("👉 Add a-z letters");
    }

    if(/[0-9]/.test(password)){
        score++;
    } else {
        reasons.push("❌ Missing number");
        suggestions.push("👉 Add numbers 0-9");
    }

    if(/[!@#$%^&*]/.test(password)){
        score++;
    } else {
        reasons.push("❌ Missing special character");
        suggestions.push("👉 Add symbols like @ # $ % & *");
    }

    let result = document.getElementById("result");
    let details = document.getElementById("details");

    let strongExample = getRandomPassword();

    if(score <= 2){
        result.innerHTML = "🔴 Weak Password";
        result.style.color = "red";
    }
    else if(score <= 4){
        result.innerHTML = "🟠 Medium Password";
        result.style.color = "orange";
    }
    else{
        result.innerHTML = "🟢 Strong Password";
        result.style.color = "green";
    }

    details.innerHTML = `
        <div class="box">
            <b>❌ Why password is weak/medium:</b><br>
            ${reasons.length ? reasons.join("<br>") : "All conditions are satisfied"}
        </div>

        <div class="box">
            <b>💡 How to make it strong:</b><br>
            ${suggestions.length ? suggestions.join("<br>") : "Your password is already strong ✅"}
        </div>

        <div class="box">
            <b>🛡️ Security Tips:</b><br>
            • Never use name or DOB<br>
            • Use mix of letters, numbers, symbols<br>
            • Avoid simple passwords like 123456<br>
            • Change password every 3–6 months
        </div>

        <div class="box">
            <b>🔐 Strong Password Example (Random):</b><br>
            ${strongExample}
        </div>
    `;
}

</script>

</body>
</html>
